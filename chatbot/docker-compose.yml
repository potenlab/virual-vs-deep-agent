version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_dev
      POSTGRES_DB: chatbot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
